<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <title>Warning – Spectra</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Space Grotesk', -apple-system, sans-serif;
        background: #0c0e1a;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .container {
        max-width: 520px;
        width: 100%;
        text-align: center;
      }

      @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
        70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      }

      .warning-logo {
        height: 32px;
        width: auto;
        margin: 0 auto 20px;
        display: block;
      }

      .risk-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        padding: 4px 14px;
        border-radius: 20px;
        margin-bottom: 16px;
        text-transform: uppercase;
      }
      .risk-badge.high { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
      .risk-badge.medium { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
      .risk-badge.low { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

      h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
        color: #fff;
      }

      #warning-domain {
        color: #c9a227;
      }

      .subtitle {
        font-size: 13px;
        color: #9ca3af;
        line-height: 1.5;
        margin-bottom: 24px;
      }

      .reason-card {
        background: #13162a;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 24px;
        text-align: left;
      }
      .reason-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #6b7280;
        margin-bottom: 6px;
      }
      .reason-text {
        font-size: 13px;
        font-weight: 500;
        color: #fca5a5;
      }
      .url-text {
        font-size: 11px;
        color: #9ca3af;
        word-break: break-all;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .btn-primary {
        width: 100%;
        background: #181c30;
        color: #f1f5f9;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 14px;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Space Grotesk', sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.18s ease, transform 0.18s ease;
      }
      .btn-primary:hover {
        background: #1e2440;
        transform: translateY(-1px);
      }

      .btn-danger {
        width: 100%;
        background: transparent;
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 10px;
        padding: 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.08);
        transform: translateY(-1px);
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 6px;
        font-size: 12px;
        color: #9ca3af;
      }
      .checkbox-row input[type="checkbox"] {
        accent-color: #c9a227;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .checkbox-row label { cursor: pointer; }

      .footer-text {
        margin-top: 20px;
        font-size: 10px;
        color: #52525b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="logo.png" alt="Spectra" class="warning-logo">

      <div class="risk-badge" id="risk-badge">HIGH</div>

      <h1>Warning: <span id="warning-domain">--</span></h1>

      <div class="subtitle">
        Spectra identified this website as potentially dangerous and blocked the page from loading.
      </div>

      <div class="reason-card">
        <div class="reason-label">Why this was blocked</div>
        <div class="reason-text" id="warning-reason">--</div>
        <div class="url-text" id="warning-url">--</div>
      </div>

      <div class="actions">
        <button id="btn-go-back" class="btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Go Back to Safety
        </button>

        <button id="btn-proceed" class="btn-danger">
          Proceed Anyway
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <div class="checkbox-row">
          <input type="checkbox" id="checkbox-dont-warn">
          <label for="checkbox-dont-warn">Don't warn again for this domain</label>
        </div>
      </div>

      <div class="footer-text">
        Spectra v2.2 &bull; Real-time protection active
      </div>
    </div>

    <script src="warning.js"></script>
  </body>
</html>
